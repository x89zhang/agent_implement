harness: .
llm:
  provider: vllm_openai
  model: qwen3.6-35b
  temperature: 0.2
  base_url: http://localhost:8000/v1
  api_key: ''
  request_timeout: 120
agent:
  name: deep-research-agent
  task: "Produce a deep research brief on the configured topic.\nRequirements:\n-\
    \ Break the topic into a few focused sub-questions before drafting conclusions.\n\
    - Prioritize trustworthy sources and explicitly note uncertainty or disagreement.\n\
    - Synthesize findings into a concise markdown report with sections:\n  1. Executive\
    \ Summary\n  2. Key Findings\n  3. Evidence and Sources\n  4. Open Questions /\
    \ Risks\n- Include source URLs directly in the report.\n- Save the final report\
    \ as \"deep_research.md\".\n- After the report is saved, respond with a short\
    \ confirmation only.\n"
graph:
  type: langchain_react
  max_iters: 10
  tool_call_format: 'TOOL_CALL: <name> <json>'
  stop_keyword: FINAL
  react_prompt: ''
  react_max_iterations: 24
  react_max_execution_time: 180
monitoring:
  enabled: true
  output_path: trace_deep_research.json
  print_trace: true
