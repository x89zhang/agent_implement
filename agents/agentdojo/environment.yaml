agentdojo:
  enabled: true
  benchmark_version: v1.2.2
  suite: slack
  # Use one combined case id so the benign task and attack task are changed together.
  # Benign-only example: case: user_task_3
  # Attack example: case: user_task_3_injection_3
  case: user_task_15_injection_5
  # By default, the selected injection task uses AgentDojo's built-in injection vectors.
  # To override the injected text manually, add custom_injections here, for example:
  # custom_injections:
  #   injection_web_0: "Custom attack text"

security:
  # Set false to remove the project-level warning about untrusted tool outputs.
  # This affects every task/harness, not only AgentDojo.
  trusted_tool_output_prompt: false
