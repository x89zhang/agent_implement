enabled: true
type: static
max_steps: 6
steps:
- Confirm the configured destination, trip dates, trip length, and itinerary requirements.
- Gather concrete options for travel logistics, lodging, meals, attractions, transit,
  and weather.
- Plan each day with geographically sensible routing and weather-aware choices.
- Assemble the full itinerary in the required daily structure.
- Save the completed itinerary artifact.
- Return a short confirmation after the artifact is saved.
