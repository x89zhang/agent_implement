harness: .
llm:
  provider: vllm_openai
  model: qwen3.5-9b
  temperature: 0.2
  base_url: http://localhost:8000/v1
  api_key: ''
agent:
  name: quebec-trip-agent
  task: 'Create a trip plan using the configured destination, trip length, and trip
    dates.

    Requirements:

    - Provide a day-by-day itinerary covering the full configured trip length.

    - For every day, include hotel, breakfast, lunch, dinner, morning activity, afternoon
    activity, evening activity, transportation notes, and brief notes.

    - Prefer concrete place names over generic descriptions.

    - Do not invent restaurants, hotels, attractions, flights, transit details, or
    weather.

    - Reflect each day''s weather and geography in the activity and routing choices.

    - Include flight options, 2-3 hotel options, weather outlook, and local transportation
    suggestions.

    - Save the final itinerary as "travel.txt".

    - After the itinerary is saved, respond with a short confirmation only.

    '
graph:
  type: langchain_react
  max_iters: 8
  tool_call_format: 'TOOL_CALL: <name> <json>'
  stop_keyword: FINAL
  react_prompt: ''
  react_max_iterations: 20
  react_max_execution_time: 120
monitoring:
  enabled: true
  output_path: trace.json
  print_trace: true
