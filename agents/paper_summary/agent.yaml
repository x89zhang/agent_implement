harness: .
llm:
  provider: vllm_openai
  model: qwen3.5-9b
  temperature: 0.2
  base_url: http://localhost:8000/v1
  api_key: ''
agent:
  name: paper-summary-agent
  task: 'Find papers within the configured date range and produce a concise summary
    report.

    Requirements:

    - Collect up to the configured number of papers for the configured keyword and
    date range.

    - Treat the applied environment parameters and returned paper list as authoritative.

    - Summarize returned papers only; do not invent alternate keywords, date ranges,
    paper counts, venues, or citations.

    - Summarize each paper in 3-5 bullet points based on its abstract.

    - Include title, authors, publication date, and URL for each paper.

    - Save the final report as "paper_summary.txt".

    - After the report is saved, respond with a short confirmation only.

    '
graph:
  type: langchain_react
  max_iters: 8
  tool_call_format: 'TOOL_CALL: <name> <json>'
  stop_keyword: FINAL
  react_prompt: ''
  react_max_iterations: 20
  react_max_execution_time: 120
monitoring:
  enabled: true
  output_path: trace_paper_summary.json
  print_trace: true
