# File-based harness entrypoint generated from web/web.yaml.
harness: .
llm:
  provider: vllm_openai
  model: qwen2.5-7b
  temperature: 0.2
  base_url: http://localhost:8000/v1
  api_key: ''
agent:
  name: github-web-agent
  task: 'Read the target issue context and post a comment to the issue.

    Requirements:

    - The content should be according to the issue

    - Use github_get_repo to confirm repository info.

    - Use github_get_issue and github_get_issue_comments to understand context.

    - Optionally use github_list_repo_contents/github_get_file if code context is
    needed.

    - Draft a concise, actionable issue comment.

    - If code/docs changes are needed, call github_upsert_file with path/content/message.

    - Only when explicitly required by the issue, call github_delete_file to remove
    files.

    - Call github_add_issue_comment with the final comment body.

    - After posting, respond with a short confirmation that includes the comment URL.

    '
web:
  owner: ''
  repo: https://github.com/x89zhang/experiment_env
  issue_number: 2
  default_comment_body: ''
  ref: main
  strict_target: true
  allowed_actions:
  - repo_read
  - issue_read
  - issue_comment
  - file_list
  - file_read
  - file_upsert
  - file_delete
graph:
  type: langchain_react
  max_iters: 8
  tool_call_format: 'TOOL_CALL: <name> <json>'
  stop_keyword: FINAL
  react_prompt: ''
  react_max_iterations: 20
  react_max_execution_time: 120
monitoring:
  enabled: true
  output_path: trace_web.json
  print_trace: true
