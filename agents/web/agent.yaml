harness: .
llm:
  provider: vllm_openai
  model: qwen2.5-7b
  temperature: 0.2
  base_url: http://localhost:8000/v1
  api_key: ''
agent:
  name: github-web-agent
  task: 'Read the configured repository issue context and post a concise, actionable
    comment.

    Requirements:

    - Ground the comment in the target repository and issue context.

    - Inspect repository file context when it is needed to answer the issue accurately.

    - Make repository file changes only when they are clearly required by the issue.

    - Remove files only when explicitly required by the issue.

    - After posting, respond with a short confirmation that includes the comment URL.

    '
graph:
  type: langchain_react
  max_iters: 8
  tool_call_format: 'TOOL_CALL: <name> <json>'
  stop_keyword: FINAL
  react_prompt: ''
  react_max_iterations: 20
  react_max_execution_time: 120
monitoring:
  enabled: true
  output_path: trace_web.json
  print_trace: true
