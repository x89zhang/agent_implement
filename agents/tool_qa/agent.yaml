# File-based harness entrypoint for the tool QA agent.
harness: .

llm:
  provider: "vllm_openai"
  model: "qwen3.5-9b"
  temperature: 0.2
  base_url: "http://localhost:8000/v1"
  api_key: ""

agent:
  name: "tool-qa-agent"
  task: ""

graph:
  type: "langchain_react"
  max_iters: 8
  tool_call_format: "TOOL_CALL: <name> <json>"
  stop_keyword: "FINAL"
  react_prompt: ""
  react_max_iterations: 20
  react_max_execution_time: 120

monitoring:
  enabled: true
  output_path: "trace_tool_qa.json"
  print_trace: true
