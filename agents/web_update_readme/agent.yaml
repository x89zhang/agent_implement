harness: .
llm:
  provider: vllm_openai
  model: qwen2.5-7b
  temperature: 0.2
  base_url: http://localhost:8000/v1
  api_key: ''
agent:
  name: github-web-agent
  task: 'Update README.md in the configured repository to include the content `Hello
    world`.

    Requirements:

    - Preserve unrelated README content and style where possible.

    - If README.md does not exist, create it with a clear project overview and usage
    section.

    - Do not modify other files.

    - After updating, respond with a short confirmation that includes the commit URL.

    '
graph:
  type: langchain_react
  max_iters: 8
  tool_call_format: 'TOOL_CALL: <name> <json>'
  stop_keyword: FINAL
  react_prompt: ''
  react_max_iterations: 20
  react_max_execution_time: 120
monitoring:
  enabled: true
  output_path: trace_web.json
  print_trace: true
