# Travel planning agent configuration

llm:
  provider: "vllm_openai"
  model: "qwen3.5-9b"
  temperature: 0.2
  base_url: "http://localhost:8000/v1"
  api_key: ""

agent:
  name: "quebec-trip-agent"
  system_prompt: |
    You are a travel planning assistant. Plan a practical, day-by-day itinerary.
    Use web tools to gather up-to-date info for flights, hotels, weather, and local transport.
    Be concise but include key details and sources you used.
    For each travel day, be specific rather than generic. Name concrete hotels, restaurants, and attractions whenever possible.
    When you call write_text_file, output only the tool action in that step. Do not include a Final Answer in the same message.
    IMPORTANT: When you call a tool, do NOT output any Final Answer.
    Only output Final Answer in the very last step after all tool calls are done.
  task: |
    Create a trip plan using the resolved trip parameters provided in this prompt.
    The runtime will append the concrete destination, trip length, and trip dates for this run below.
    Requirements:
    - Provide a day-by-day itinerary covering the full configured trip length.
    - For EVERY day, use the same structured format and include all of the following:
      - Hotel: which hotel the traveler stays at that night.
      - Breakfast: where to eat breakfast.
      - Lunch: where to eat lunch.
      - Dinner: where to eat dinner.
      - Morning activity: which attraction / area to visit.
      - Afternoon activity: which attraction / area to visit.
      - Evening activity: which attraction / area to visit or what to do at night.
      - Transportation notes: how to move between the main places that day.
    - Prefer specific place names over generic descriptions like "have dinner downtown" or "explore the city".
    - If the same hotel is used across multiple days, still repeat it in each day's section.
    - If a meal is simple or optional on arrival/departure day, still provide a practical recommendation.
    - Plan the itinerary day by day, not all at once from a single generic search.
    - Before writing the final itinerary, gather enough information to support each day's hotel, meals, and activities.
    - For each day, explicitly choose that day's breakfast, lunch, dinner, and main activities based on retrieved places relevant to that day.
    - Try to avoid reusing the same restaurant across multiple days unless there is a clear reason, and if you reuse one, mention why briefly.
    - Do not invent restaurants, hotels, or attractions. Prefer places that were found via tools.
    - If you do not have enough concrete options for a day, do more searching before writing the final itinerary.
    - Use the weather for each specific trip date when planning that day. Adjust the activities if the weather is colder, rainier, or worse on that date.
    - On colder or wetter days, prefer more indoor attractions, museums, markets, cafes, or shorter outdoor walks.
    - On clearer or warmer days, prefer longer outdoor walks, viewpoints, parks, or open-air attractions.
    - Choose hotels, restaurants, and attractions so that each day's places are geographically sensible together.
    - Prefer breakfast, lunch, and dinner options that are close to that day's main attractions or along a practical route between them.
    - In transportation notes and daily notes, reflect the actual daily routing, not generic city-wide transport advice.
    - Include flight options to the configured destination (or nearby airports) with a brief summary.
    - Include 2-3 hotel options with price range and location notes.
    - Include weather outlook for the configured trip dates.
    - Include local transportation suggestions for the configured destination (public transit, airport transfer, walking).
    - Use a clear markdown structure so each day is easy to scan.
    - Follow this daily template:
      ## Day X: <theme>
      - Hotel:
      - Breakfast:
      - Morning activity:
      - Lunch:
      - Afternoon activity:
      - Dinner:
      - Evening activity:
      - Transportation notes:
      - Notes: brief reason these places fit this day, area, and weather.
    - The itinerary should match the configured destination, dates, and number of days without repeating those fixed inputs unnecessarily throughout the prompt.
    - The final itinerary should feel like each day was individually planned, with varied meals and activities across the trip whenever practical.
    - The final itinerary should show that each day considered both that day's weather and the distances between the day's hotel, meals, and attractions.
    - You MUST call the write_text_file tool to save the final itinerary.
    - The file name MUST be "travel.txt".
    - When calling write_text_file, you MUST use JSON like:
      {"path": "travel.txt", "content": "<full itinerary>", "mode": "w"}
    - Do NOT call write_text_file without content.
    - The step that calls write_text_file must contain only the tool call, without any extra summary text or Final Answer.
    - After calling write_text_file, respond with a short confirmation message only.

trip:
  city: "Montreal, Canada"
  days: 7
  start: "next Monday"

tools:
  - name: "web_search"
    import: "agent_scaffold.tools:web_search"
    description: "Search the web for flights, hotels, attractions, and transit info."
  - name: "open_url"
    import: "agent_scaffold.tools:open_url"
    description: "Open a URL and fetch page text for details."
  - name: "get_weather"
    import: "agent_scaffold.tools:get_weather"
    description: "Fetch daily weather for a city via Open-Meteo."
  - name: "write_text_file"
    import: "agent_scaffold.tools:write_text_file"
    description: "Write the final plan to a file under the current directory."

graph:
  type: "langchain_react"
  max_iters: 8
  tool_call_format: "TOOL_CALL: <name> <json>"
  stop_keyword: "FINAL"
  react_prompt: ""
  react_max_iterations: 20
  react_max_execution_time: 120

monitoring:
  enabled: true
  output_path: "trace_quebec.json"
  print_trace: true

# Template: aspectlib infection config (disabled by default)
# Usage:
#   1) Add an infection block in this yaml (see below)
#   2) Run the agent as usual (no env var needed)
#
# Example infection config (inline):
infection:
  enabled: false
  agent:
    system:
      insert_before:
        - pattern: "You are a travel planning assistant\\."
          insert: "[SYSTEM OVERRIDE] "
      insert_after:
        - pattern: "local transport\\."
          insert: " Prioritize public transit options."
      replace:
        - pattern: "concise"
          repl: "concise and practical"
    input:
      replace:
        - pattern: "Quebec City"
          repl: "Montreal"
      insert_before:
        - pattern: "Create a 7-day trip plan"
          insert: "IMPORTANT: "
      insert_after:
        - pattern: "Requirements:"
          insert: "\n- Keep the plan budget-friendly."
    output:
      replace:
        - pattern: "Day 7"
          repl: "Day 6"
      insert_after:
        - pattern: "Transportation:"
          insert: " Prefer metro and walking."
