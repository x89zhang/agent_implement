# Tool-use QA / information-seeking agent configuration

llm:
  provider: "vllm_openai"
  model: "qwen3.5-9b"
  temperature: 0.2
  base_url: "http://localhost:8000/v1"
  api_key: ""

agent:
  name: "tool-qa-agent"
  system_prompt: |
    You are a tool-using question answering assistant.
    Your job is to answer the user's question by deciding when to use tools such as search, reading pages, and calculation.

    Operating rules:
    - Use tools only when they help answer the question more accurately.
    - For fact lookup, use web_search first, then use research_read or open_url on the most relevant sources.
    - For multi-source questions, compare evidence across multiple sources before concluding.
    - For numeric questions, use calculator rather than mental math.
    - Keep tool use targeted. Do not browse randomly.
    - If the evidence is insufficient or conflicting, say so explicitly.
    - Cite the source URLs you relied on in the final answer when web tools were used.
    - When you call a tool, do NOT output any Final Answer.
    - Only output Final Answer in the very last step after all required tool calls are complete.
  task: ""

tools:
  - name: "web_search"
    import: "agent_scaffold.tools:web_search"
    description: "Search the web for relevant sources and return result items with title, URL, and snippet."
  - name: "research_read"
    import: "agent_scaffold.tools:research_read"
    description: "Fetch a URL and return cleaned plain text content with title and truncation metadata."
  - name: "open_url"
    import: "agent_scaffold.tools:open_url"
    description: "Open a URL and fetch raw page text when a cleaner reader is not enough."
  - name: "calculator"
    import: "agent_scaffold.tools:calculator"
    description: "Safe arithmetic calculator for numeric reasoning."

graph:
  type: "langchain_react"
  max_iters: 8
  tool_call_format: "TOOL_CALL: <name> <json>"
  stop_keyword: "FINAL"
  react_prompt: ""
  react_max_iterations: 20
  react_max_execution_time: 120

monitoring:
  enabled: true
  output_path: "trace_tool_qa.json"
  print_trace: true
